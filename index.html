<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>權證小哥 - 處置股策略</title>

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LS8DYR2N8X"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&display=swap');

      :root {
        --gold-light: #f3e5ab;
        --gold-primary: #d4af37;
        --gold-dark: #aa8a2e;
        --deep-blue: #1a3a6a;
        --bg-dark: #080c14;
        --tech-blue: #1a4a7a;
        --blue-glow: #2563eb;
        --brown-accent: #8B6914;
      }

      body {
        font-family: 'Noto Serif TC', serif;
        background-color: var(--bg-dark);
        color: #f3f4f6;
        overflow-x: hidden;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .serif-font {
        font-family: 'Noto Serif TC', serif;
      }

      .text-gold-gradient {
        background: linear-gradient(to bottom, #fef9c3, #d4af37, #854d0e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.3));
      }

      .text-silver-gradient {
        background: linear-gradient(to bottom, #ffffff 0%, #d1d5db 30%, #9ca3af 60%, #4b5563 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* 平滑滑入動畫 - 極小位移確保不跳動 */
      @keyframes slide-in-smooth {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scale-in {
        from { opacity: 0; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1); }
      }

      .animate-reveal {
        animation: slide-in-smooth 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        will-change: transform, opacity;
      }
      .animate-img-reveal {
        animation: scale-in 1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
        opacity: 0;
        will-change: transform, opacity;
      }

      .blue-shimmer-btn {
        background-color: #1a3a6a;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
      }
      .blue-shimmer-btn:hover {
        background-color: #2563eb;
        transform: translateY(-2px);
      }
      .blue-shimmer-btn::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -100%;
        width: 50%;
        height: 200%;
        background: rgba(255, 255, 255, 0.3);
        transform: rotate(30deg);
        transition: 0.6s;
      }
      .blue-shimmer-btn:hover::after { left: 150%; }

      .app-feature-card-bg {
        background: linear-gradient(to bottom, #0f1a2e 0%, rgba(8, 12, 20, 0.95) 100%);
        position: relative;
        border: 1px solid rgba(212, 175, 55, 0.2);
        overflow: hidden;
      }

      .course-card-bg {
        background: linear-gradient(to bottom, #0f1a2e 0%, rgba(0,0,0,0.8) 100%);
        border: 1px solid rgba(212, 175, 55, 0.1);
      }

      .deep-glow-bg {
        background: radial-gradient(circle at center, #0f1a2e 0%, #080c14 70%);
      }

      /* 藍色漸層背景區塊 */
      .lecturer-blue-gradient {
        background: linear-gradient(to bottom, #080c14 0%, #0a1e3d 50%, #080c14 100%);
      }

      /* 科技感旋轉圓環 */
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes spin-slow-reverse {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }
      @keyframes pulse-ring {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.04); }
      }
      .tech-ring-outer {
        animation: spin-slow 20s linear infinite;
      }
      .tech-ring-inner {
        animation: spin-slow-reverse 15s linear infinite;
      }
      .tech-ring-pulse {
        animation: pulse-ring 3s ease-in-out infinite;
      }
      .tech-ring-glow {
        animation: pulse-ring 4s ease-in-out infinite 1s;
      }

      /* 純 CSS 滾動滑入 */
      @keyframes scroll-slide-in {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .scroll-reveal {
        animation: scroll-slide-in linear both;
        animation-timeline: view();
        animation-range: entry 0% entry 35%;
      }

      /* 交錯出現：同一 viewport 的卡片依序動畫 */
      .scroll-stagger-1 { animation-range: entry 0% entry 30%; }
      .scroll-stagger-2 { animation-range: entry 8% entry 38%; }
      .scroll-stagger-3 { animation-range: entry 16% entry 46%; }
      .scroll-stagger-4 { animation-range: entry 24% entry 54%; }
      .scroll-stagger-5 { animation-range: entry 32% entry 62%; }
      .scroll-stagger-6 { animation-range: entry 40% entry 70%; }

    </style>
  </head>
  <body>
    <!-- Meta Pixel Code (noscript fallback) -->
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1287370458299408&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
